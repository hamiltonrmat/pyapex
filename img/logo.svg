<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="200" height="200" fill="#0d3b66" rx="20"/>

  <!-- Python snakes minimalist integration (top right) -->
  <g transform="translate(130, 25) scale(0.6)">
    <!-- Blue Snake -->
    <path d="M15,10 h15 a10,10 0 0 1 10,10 v10 a10,10 0 0 1 -10,10 h-20 a10,10 0 0 0 -10,10 v10" fill="none" stroke="#306998" stroke-width="8" stroke-linecap="round"/>
    <circle cx="20" cy="15" r="3" fill="#0d3b66"/>
    <!-- Yellow Snake -->
    <path d="M35,60 h-15 a10,10 0 0 1 -10,-10 v-10 a10,10 0 0 1 10,-10 h20 a10,10 0 0 0 10,-10 v-10" fill="none" stroke="#FFD43B" stroke-width="8" stroke-linecap="round"/>
    <circle cx="30" cy="55" r="3" fill="#0d3b66"/>
  </g>

  <!-- APEX geometric logo shape (centered) -->
  <g transform="translate(100, 110) scale(1.1)">
    <!-- A -->
    <path d="M-30,-60 L0,-75 L30,-60 L30,-50 L15,-55 L15,-40 L-15,-40 L-15,-55 L-30,-50 Z M-15,-60 L0,-68 L15,-60 Z" fill="#e85d3a"/>
    <!-- P -->
    <path d="M-30,-35 L30,-35 L30,-15 L10,-15 L10,-5 L-30,-5 Z M-10,-25 L15,-25 L15,-15 L-10,-15 Z" fill="#e85d3a"/>
    <!-- E -->
    <path d="M-30,0 L30,0 L30,5 L-10,5 L-10,10 L20,10 L20,15 L-10,15 L-10,20 L30,20 L30,25 L-30,25 Z" fill="#e85d3a"/>
    <!-- X -->
    <path d="M-30,30 L-15,30 L0,40 L15,30 L30,30 L10,45 L30,60 L15,60 L0,50 L-15,60 L-30,60 L-10,45 Z" fill="#e85d3a"/>
  </g>
</svg>
