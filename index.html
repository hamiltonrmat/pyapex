<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyApex - Accueil</title>
    <link rel="icon" type="image/png" href="apple-touch-icon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top left, #1a202c, #000);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .landing-container {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 2rem;
        }

        .logo-landing {
            margin-bottom: 3rem;
            animation: float 6s ease-in-out infinite;
        }

        .logo-landing svg {
            width: 80px;
            height: 80px;
            stroke: var(--primary);
            drop-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .title {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 4rem;
        }

        .cards-wrapper {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 3rem 2rem;
            width: 320px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .role-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .role-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
        }

        .role-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .role-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* Effet de lueur dynamique en fond */
        .glow-bg {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    <div class="landing-container">
        <div class="logo-landing">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 22h20L12 2z"></path>
            </svg>
        </div>
        
        <h1 class="title">PyApex Plataform</h1>
        <p class="subtitle">Sélectionnez votre espace pour continuer.</p>

        <div class="cards-wrapper">
            <!-- Carte Étudiant -->
            <a href="etudiant.html" class="role-card">
                <div class="role-icon">💻</div>
                <h2 class="role-title">Espace Étudiant</h2>
                <p class="role-desc">Passez vos examens de code en direct dans un environnement sécurisé.</p>
            </a>

            <!-- Carte Professeur -->
            <a href="admin.html" class="role-card">
                <div class="role-icon">🎓</div>
                <h2 class="role-title">Espace Professeur</h2>
                <p class="role-desc">Créez des sujets, construisez vos batteries de tests et suivez vos classes.</p>
            </a>
        </div>
    </div>
</body>
</html>
